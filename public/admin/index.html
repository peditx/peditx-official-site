<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- Favicons -->
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">

  <link href="/admin/config.yml" type="text/yaml" rel="cms-config-url">

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#121212">

  <title>Content Manager</title>

  <!-- Dark Mode + Mobile Friendly CSS -->
  <style>
    body {
      background-color: #121212;
      color: #ffffff;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    /* Make CMS container flexible */
    .cms-root, #nc-root {
      max-width: 100%;
      padding: 1rem;
      box-sizing: border-box;
    }

    a {
      color: #90caf9;
    }

    /* Modern Scrollbar for Dark Mode */
    ::-webkit-scrollbar {
      width: 10px;
    }
    ::-webkit-scrollbar-track {
      background: #1e1e1e;
    }
    ::-webkit-scrollbar-thumb {
      background-color: #444;
      border-radius: 5px;
    }
  </style>
</head>
<body>
  <!-- Load Decap CMS -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

  <script>
    // Register Service Worker on window load
    window.addEventListener('load', function() {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js').then(
          function(registration) {
            console.log('ServiceWorker registration successful');
          }, 
          function(err) {
            console.log('ServiceWorker registration failed: ', err);
          }
        );
      }
    });

    // Register Custom Editor Styles and Preview Templates
    window.addEventListener('decap-cms-init', () => {
      // Dracula Unified Dark Theme for Decap UI
      const css = `
        :root {
          --primary-light: #6f7b9a !important;
          --primary: #50fa7b !important; /* Accent Green */
          --primary-dark: #2d3142 !important;
          --background-light: #2a2a2a !important;
          --background: #1e1e1e !important;
          --background-dark: #121212 !important;
          --text-light: #ffffff !important;
          --text: #e0e0e0 !important;
          --text-dark: #b3b3b3 !important;
          --border-light: #555 !important;
          --border: #444 !important;
          --border-dark: #333 !important;
          --surface-light: #333 !important;
          --surface: #2a2a2a !important;
          --surface-dark: #222 !important;
          --status-success: #50fa7b !important;
          --status-success-light: #81c784 !important;
          --status-warning: #ffa726 !important;
          --status-warning-light: #ffb74d !important;
          --status-error: #ff5555 !important;
          --status-error-light: #ef5350 !important;
          --text-on-primary: #121212 !important;
          --text-on-success: #000000 !important;
          --text-on-warning: #000000 !important;
          --text-on-error: #ffffff !important;
        }
        
        /* Make the GitHub Link input styling clean and read-only looking */
        input[type="text"][id^="github_url"] {
          background-color: #121212 !important;
          color: #ff79c6 !important;
          border: 1px dashed #ff79c6 !important;
          font-family: monospace !important;
          cursor: default !important;
        }
      `;
      window.CMS.registerCmsStyles(css, { raw: true });
      console.log('Dracula theme registered.');

      // Inline React implementation for the Custom Script Preview
      const h = window.h;
      const ScriptPreview = window.createClass({
        render: function() {
          const entry = this.props.entry;
          const githubUrl = entry.getIn(['data', 'github_url']) || '#';
          
          return h('div', {
            style: {
              padding: '40px 20px',
              fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif',
              backgroundColor: '#121212',
              minHeight: '100%',
              color: '#ffffff',
              display: 'flex',
              flexDirection: 'column',
              alignItems: 'center',
              justifyContent: 'center',
              textAlign: 'center'
            }
          }, [
            h('div', {
              style: {
                backgroundColor: '#1e1e1e',
                padding: '40px 30px',
                borderRadius: '16px',
                border: '1px solid #44475a',
                maxWidth: '480px',
                boxShadow: '0 15px 35px rgba(0,0,0,0.6)',
                display: 'flex',
                flexDirection: 'column',
                alignItems: 'center'
              }
            }, [
              h('div', {
                style: {
                  fontSize: '48px',
                  marginBottom: '15px'
                }
              }, '🛠️'),
              h('h3', { 
                style: { 
                  color: '#8be9fd', 
                  margin: '0 0 10px 0', 
                  fontSize: '22px',
                  fontWeight: 'bold'
                } 
              }, 'PeDitXOS Tools Editor'),
              h('p', { 
                style: { 
                  color: '#f8f8f2', 
                  fontSize: '14px', 
                  lineHeight: '1.6',
                  margin: '0 0 30px 0' 
                } 
              }, 'This script is hosted in an external repository. Click the button below to open GitHub\'s native code editor and directly modify the live script.'),
              
              h('a', {
                href: githubUrl,
                target: '_blank',
                rel: 'noopener noreferrer',
                style: {
                  display: 'inline-flex',
                  alignItems: 'center',
                  justifyContent: 'center',
                  background: 'linear-gradient(135deg, #50fa7b, #3df26b)',
                  color: '#282a36',
                  padding: '14px 35px',
                  borderRadius: '30px',
                  fontSize: '16px',
                  fontWeight: 'bold',
                  textDecoration: 'none',
                  boxShadow: '0 5px 20px rgba(80, 250, 123, 0.4)',
                  transition: 'all 0.3s ease',
                  cursor: 'pointer'
                }
              }, 'Open GitHub Editor 🚀'),
              
              h('div', { 
                style: { 
                  marginTop: '30px', 
                  fontSize: '11px', 
                  color: '#bd93f9',
                  width: '100%',
                  textAlign: 'left'
                } 
              }, [
                h('span', { style: { display: 'block', marginBottom: '5px', fontWeight: 'bold', color: '#6272a4' } }, 'Destination URL:'),
                h('code', { 
                  style: { 
                    backgroundColor: '#121212', 
                    padding: '8px 12px', 
                    borderRadius: '6px', 
                    color: '#ff79c6', 
                    wordBreak: 'break-all',
                    display: 'block',
                    border: '1px solid #282a36'
                  } 
                }, githubUrl)
              ])
            ])
          ]);
        }
      });

      // Bind the custom preview template to all file names defined in config.yml
      const scriptFiles = [
        'passwall1_edit',
        'passwall2_edit',
        'passwall_both_edit',
        'ezexroot_edit',
        'expand_edit',
        'service_runner_edit'
      ];

      scriptFiles.forEach(fileName => {
        window.CMS.registerPreviewTemplate(fileName, ScriptPreview);
      });
      console.log('Script preview templates successfully registered.');
    });
  </script>
</body>
</html>

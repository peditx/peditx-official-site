<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- Favicons -->
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">

  <link href="/admin/config.yml" type="text/yaml" rel="cms-config-url">

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#121212">

  <title>Content Manager</title>

  <!-- Dark Mode + Mobile Friendly CSS -->
  <style>
    body {
      background-color: #121212;
      color: #ffffff;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    /* Make CMS container flexible */
    .cms-root, #nc-root {
      max-width: 100%;
      padding: 1rem;
      box-sizing: border-box;
    }

    a {
      color: #90caf9;
    }

    /* Modern Scrollbar for Dark Mode */
    ::-webkit-scrollbar {
      width: 10px;
    }
    ::-webkit-scrollbar-track {
      background: #1e1e1e;
    }
    ::-webkit-scrollbar-thumb {
      background-color: #444;
      border-radius: 5px;
    }
  </style>
</head>
<body>
  <!-- Load Decap CMS using fallback-safe CDN -->
  <script src="https://cdn.jsdelivr.net/npm/decap-cms@3.0.0/dist/decap-cms.js"></script>

  <script>
    // Register Service Worker on window load
    window.addEventListener('load', function() {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js').then(
          function(registration) {
            console.log('ServiceWorker registration successful');
          }, 
          function(err) {
            console.log('ServiceWorker registration failed: ', err);
          }
        );
      }
    });

    // Register Custom Editor Styles and Preview Templates
    window.addEventListener('decap-cms-init', () => {
      // Dracula Unified Dark Theme for Decap UI & Script Preview
      const css = `
        :root {
          --primary-light: #6f7b9a !important;
          --primary: #50fa7b !important; /* Accent Green */
          --primary-dark: #2d3142 !important;
          --background-light: #2a2a2a !important;
          --background: #1e1e1e !important;
          --background-dark: #121212 !important;
          --text-light: #ffffff !important;
          --text: #e0e0e0 !important;
          --text-dark: #b3b3b3 !important;
          --border-light: #555 !important;
          --border: #444 !important;
          --border-dark: #333 !important;
          --surface-light: #333 !important;
          --surface: #2a2a2a !important;
          --surface-dark: #222 !important;
          --status-success: #50fa7b !important;
          --status-success-light: #81c784 !important;
          --status-warning: #ffa726 !important;
          --status-warning-light: #ffb74d !important;
          --status-error: #ff5555 !important;
          --status-error-light: #ef5350 !important;
          --text-on-primary: #121212 !important;
          --text-on-success: #000000 !important;
          --text-on-warning: #000000 !important;
          --text-on-error: #ffffff !important;
        }

        /* Styling for the GitHub URL text field in CMS editor */
        input[type="text"][id^="github_url"] {
          background-color: #121212 !important;
          color: #ff79c6 !important;
          border: 1px dashed #ff79c6 !important;
          font-family: monospace !important;
          cursor: default !important;
        }

        /* Script Preview Layout Styles */
        .peditx-preview-container {
          padding: 40px 20px;
          background-color: #121212;
          color: #ffffff;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          text-align: center;
          min-height: 100vh;
          box-sizing: border-box;
        }
        .peditx-preview-card {
          background-color: #1e1e1e;
          padding: 40px 30px;
          border-radius: 16px;
          border: 1px solid #44475a;
          max-width: 480px;
          box-shadow: 0 15px 35px rgba(0,0,0,0.6);
          display: flex;
          flex-direction: column;
          align-items: center;
        }
        .peditx-preview-icon {
          font-size: 48px;
          margin-bottom: 15px;
        }
        .peditx-preview-title {
          color: #8be9fd;
          margin: 0 0 10px 0;
          font-size: 22px;
          font-weight: bold;
        }
        .peditx-preview-text {
          color: #f8f8f2;
          font-size: 14px;
          line-height: 1.6;
          margin: 0 0 30px 0;
        }
        
        @keyframes buttonPulse {
          0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 174, 66, 0.7); }
          70% { transform: scale(1.03); box-shadow: 0 0 0 12px rgba(255, 174, 66, 0); }
          100% { transform: scale(1); }
        }

        .peditx-preview-button {
          display: inline-flex;
          align-items: center;
          justify-content: center;
          background: linear-gradient(135deg, #ffae42, #ff8c00);
          color: #21222c;
          padding: 14px 35px;
          border-radius: 30px;
          font-size: 16px;
          font-weight: bold;
          text-decoration: none;
          box-shadow: 0 5px 20px rgba(255, 174, 66, 0.4);
          transition: transform 0.2s, box-shadow 0.2s;
          cursor: pointer;
          animation: buttonPulse 2.5s infinite;
        }
        .peditx-preview-button:hover {
          transform: translateY(-2px);
          animation-play-state: paused;
          box-shadow: 0 8px 25px rgba(255, 174, 66, 0.6);
        }
        .peditx-preview-url-box {
          margin-top: 30px;
          font-size: 11px;
          color: #bd93f9;
          width: 100%;
          text-align: left;
        }
        .peditx-preview-url-label {
          display: block;
          margin-bottom: 5px;
          font-weight: bold;
          color: #6272a4;
        }
        .peditx-preview-url-code {
          background-color: #121212;
          padding: 8px 12px;
          border-radius: 6px;
          color: #ff79c6;
          word-break: break-all;
          display: block;
          border: 1px solid #282a36;
          font-family: monospace;
        }
      `;
      window.CMS.registerCmsStyles(css, { raw: true });
      console.log('Dracula theme styles applied.');

      // Inline React implementation for the Custom Script Preview
      const h = window.h;
      const ScriptPreview = window.createClass({
        render: function() {
          const entry = this.props.entry;
          // Dynamically read 'github_url' from the active file entry
          const githubUrl = entry.getIn(['data', 'github_url']) || '#';
          
          return h('div', { className: 'peditx-preview-container' }, [
            h('div', { className: 'peditx-preview-card' }, [
              h('div', { className: 'peditx-preview-icon' }, '🛠️'),
              h('h3', { className: 'peditx-preview-title' }, 'PeDitXOS Script Link'),
              h('p', { className: 'peditx-preview-text' }, 'This script is hosted in an external repository. Click the button below to open GitHub\'s native code editor and directly modify the live script.'),
              
              h('a', {
                href: githubUrl,
                target: '_blank',
                rel: 'noopener noreferrer',
                className: 'peditx-preview-button'
              }, 'Edit on GitHub 🚀'),
              
              h('div', { className: 'peditx-preview-url-box' }, [
                h('span', { className: 'peditx-preview-url-label' }, 'Repository Target URL:'),
                h('code', { className: 'peditx-preview-url-code' }, githubUrl)
              ])
            ])
          ]);
        }
      });

      // KEY FIX: Register template against the COLLECTION name 'peditxos_tools'
      // This ensures that all files under this collection automatically render this view!
      window.CMS.registerPreviewTemplate('peditxos_tools', ScriptPreview);
      console.log('Script preview template successfully registered under "peditxos_tools".');
    });
  </script>
</body>
</html>
